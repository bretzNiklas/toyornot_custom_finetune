name: Deploy Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-serve.txt

      - name: Run deployment safety tests
        run: python -m unittest tests.test_local_api tests.test_sync_model_artifact

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    env:
      DEPLOY_APP_DIR: /home/niklas/toyornot_custom_finetune
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Deploy commit to production
        run: |
          PORT="${DEPLOY_PORT:-22}"
          ssh -i ~/.ssh/id_ed25519 -p "${PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "bash '${DEPLOY_APP_DIR}/deploy/ubuntu/deploy_remote.sh' '${GITHUB_SHA}'"
